<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lx Search P1.2</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

<style>
:root {
    --font-display: 'Orbitron', sans-serif;
    --font-body: 'Inter', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
    
    --app-height: 100vh;
    --bg-base: #010308;
    --bg-panel: rgba(4, 12, 24, 0.4);
    --bg-card: linear-gradient(160deg, rgba(10, 22, 45, 0.5) 0%, rgba(2, 6, 15, 0.8) 100%);
    
    --neon-primary: #00f0ff;
    --neon-secondary: #0057ff;
    --neon-accent: #ff003c;
    --neon-warning: #ffcf00;
    
    --text-main: #ffffff;
    --text-muted: #8b9bb4;
    --text-dark: #0a1128;
    
    --glass-border: 1px solid rgba(0, 240, 255, 0.15);
    --glass-border-active: 1px solid rgba(0, 240, 255, 0.6);
    
    --shadow-neon: 0 0 10px rgba(0, 240, 255, 0.2), 0 0 20px rgba(0, 240, 255, 0.1);
    --shadow-panel: 0 8px 32px 0 rgba(0, 0, 0, 0.6);
    
    --radius-lg: 20px;
    --radius-md: 12px;
    --radius-sm: 8px;
    
    --transition: 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    background-color: var(--bg-base);
    background-image: 
        radial-gradient(circle at 15% 50%, rgba(0, 87, 255, 0.08) 0%, transparent 50%),
        radial-gradient(circle at 85% 30%, rgba(0, 240, 255, 0.05) 0%, transparent 50%);
    font-family: var(--font-body);
    color: var(--text-main);
    height: var(--app-height);
    width: 100vw;
    overflow: hidden;
    position: relative;
    -webkit-font-smoothing: antialiased;
}

body::after {
    content: "";
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 240, 255, 0.03) 2px, rgba(0, 240, 255, 0.03) 4px);
    pointer-events: none;
    z-index: 100;
}

.app-container {
    display: flex;
    flex-direction: column;
    height: 100%;
    position: relative;
    z-index: 2;
    animation: bootSequence 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

@keyframes bootSequence {
    0% { opacity: 0; filter: blur(20px) brightness(2); transform: scale(1.05); }
    100% { opacity: 1; filter: blur(0) brightness(1); transform: scale(1); }
}

.hud-container {
    padding: clamp(15px, 2vw, 25px);
    flex-shrink: 0;
}

.hud-controls {
    background: var(--bg-panel);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: var(--glass-border);
    border-radius: var(--radius-lg);
    padding: clamp(20px, 2.5vw, 30px);
    box-shadow: var(--shadow-panel), inset 0 1px 0 rgba(255,255,255,0.1);
    max-width: 1800px;
    margin: 0 auto;
    position: relative;
    overflow: hidden;
}

.hud-controls::before {
    content: '';
    position: absolute;
    top: 0; left: -100%; width: 50%; height: 2px;
    background: linear-gradient(90deg, transparent, var(--neon-primary), transparent);
    animation: scanline 4s linear infinite;
}

@keyframes scanline {
    0% { left: -100%; }
    100% { left: 200%; }
}

.header-and-search {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 30px;
    align-items: center;
    margin-bottom: 25px;
}

.header h1 {
    font-family: var(--font-display);
    font-size: clamp(1.5rem, 3vw, 2rem);
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 4px;
    color: transparent;
    -webkit-text-stroke: 1px var(--neon-primary);
    position: relative;
}

.header h1::before {
    content: 'Lx Search P1.2';
    position: absolute;
    left: 0; top: 0;
    color: var(--neon-primary);
    filter: drop-shadow(0 0 15px var(--neon-primary));
    clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
    animation: glitch 5s infinite;
}

@keyframes glitch {
    0%, 95%, 100% { clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%); transform: translate(0); }
    96% { clip-path: polygon(0 20%, 100% 20%, 100% 30%, 0 30%); transform: translate(-2px, 2px); }
    97% { clip-path: polygon(0 60%, 100% 60%, 100% 65%, 0 65%); transform: translate(2px, -2px); }
    98% { clip-path: polygon(0 40%, 100% 40%, 100% 50%, 0 50%); transform: translate(-2px, -2px); color: var(--neon-accent); }
    99% { clip-path: polygon(0 80%, 100% 80%, 100% 90%, 0 90%); transform: translate(2px, 2px); }
}

.search-wrapper {
    position: relative;
    width: 100%;
}

.search-icon {
    position: absolute;
    left: 20px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--neon-primary);
    font-size: 1.2rem;
    pointer-events: none;
    opacity: 0.7;
}

.search-input {
    width: 100%;
    background: rgba(0, 0, 0, 0.4);
    border: 1px solid rgba(0, 240, 255, 0.2);
    border-radius: var(--radius-md);
    padding: 16px 20px 16px 55px;
    color: var(--text-main);
    font-size: clamp(1rem, 1.5vw, 1.1rem);
    font-family: var(--font-mono);
    transition: var(--transition);
    box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.5);
}

.search-input:focus {
    outline: none;
    border-color: var(--neon-primary);
    background: rgba(0, 240, 255, 0.03);
    box-shadow: 0 0 20px rgba(0, 240, 255, 0.15), inset 0 0 15px rgba(0, 240, 255, 0.05);
}

.search-input::placeholder { color: var(--text-muted); opacity: 0.5; }

.filter-wrapper {
    display: flex;
    gap: 20px;
}

.filter-select, .reset-button {
    flex-grow: 1;
    background: rgba(0, 0, 0, 0.4);
    border: var(--glass-border);
    padding: 14px 20px;
    border-radius: var(--radius-md);
    color: var(--text-main);
    cursor: pointer;
    transition: var(--transition);
    font-size: 0.95rem;
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 1px;
}

.filter-select {
    appearance: none;
    background-image: url('data:image/svg+xml;charset=US-ASCII,<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="%2300f0ff"><path d="M7 10L2 5h10L7 10z"/></svg>');
    background-repeat: no-repeat;
    background-position: right 20px center;
    background-size: 12px;
    padding-right: 50px;
}

.filter-select option { background: var(--bg-base); color: var(--text-main); }

.filter-select:hover, .filter-select:focus {
    border-color: var(--neon-primary);
    box-shadow: var(--shadow-neon);
    outline: none;
}

.reset-button {
    flex-grow: 0;
    background: rgba(255, 0, 60, 0.1);
    border-color: rgba(255, 0, 60, 0.3);
    color: var(--neon-accent);
    font-weight: 700;
    min-width: 140px;
}

.reset-button:hover {
    background: var(--neon-accent);
    color: #000;
    border-color: var(--neon-accent);
    box-shadow: 0 0 20px rgba(255, 0, 60, 0.4);
}

#status-bar {
    min-height: 40px;
    margin-top: 20px;
    display: flex;
    align-items: center;
    gap: 15px;
    flex-wrap: wrap;
}

.suggestions-area, .filter-tags-container {
    font-family: var(--font-mono);
    font-size: 0.9rem;
    display: flex;
    gap: 10px;
    align-items: center;
}

.suggestions-area span { color: var(--neon-warning); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }

.suggestions-area a {
    color: var(--text-muted);
    cursor: pointer;
    text-decoration: none;
    padding: 4px 10px;
    border: 1px solid rgba(255, 207, 0, 0.2);
    border-radius: var(--radius-sm);
    transition: var(--transition);
}

.suggestions-area a:hover {
    color: var(--neon-warning);
    border-color: var(--neon-warning);
    background: rgba(255, 207, 0, 0.1);
    box-shadow: 0 0 10px rgba(255, 207, 0, 0.2);
}

.filter-tag {
    display: inline-flex;
    align-items: center;
    background: rgba(0, 240, 255, 0.1);
    border: 1px solid var(--neon-primary);
    padding: 6px 14px;
    border-radius: 20px;
    color: var(--neon-primary);
    font-size: 0.85rem;
    animation: fadeInScale 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.filter-tag i {
    margin-left: 8px;
    cursor: pointer;
    transition: var(--transition);
}

.filter-tag i:hover { color: var(--neon-accent); transform: scale(1.2) rotate(90deg); }

.scroll-container {
    position: relative;
    flex: 1;
    display: flex;
    align-items: center;
    min-height: 280px;
}

#cardContainer {
    display: flex;
    padding: 20px clamp(30px, 8vw, 100px);
    overflow-x: auto;
    scroll-behavior: smooth;
    gap: clamp(20px, 3vw, 35px);
    width: 100%;
    scrollbar-width: none;
    align-items: center;
}

#cardContainer::-webkit-scrollbar { display: none; }

.scroll-button {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(2, 6, 15, 0.8);
    backdrop-filter: blur(10px);
    color: var(--neon-primary);
    border: var(--glass-border);
    width: clamp(45px, 4vw, 60px);
    height: clamp(80px, 15vh, 120px);
    border-radius: var(--radius-md);
    font-size: 1.5rem;
    cursor: pointer;
    transition: var(--transition);
    z-index: 20;
    display: flex;
    align-items: center;
    justify-content: center;
}

.scroll-button:hover {
    background: rgba(0, 240, 255, 0.1);
    border-color: var(--neon-primary);
    box-shadow: inset 0 0 20px rgba(0, 240, 255, 0.2), 0 0 20px rgba(0, 240, 255, 0.2);
}

.scroll-left { left: clamp(10px, 2vw, 30px); }
.scroll-right { right: clamp(10px, 2vw, 30px); }

.item-card {
    flex: 0 0 clamp(300px, 30vw, 350px);
    height: 200px;
    background: var(--bg-card);
    border: var(--glass-border);
    border-radius: var(--radius-lg);
    padding: 25px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
    opacity: 0;
    transform: translateY(30px);
    animation: cardEnter 0.5s forwards;
}

@keyframes cardEnter {
    to { opacity: 1; transform: translateY(0); }
}

.item-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: linear-gradient(180deg, rgba(0,240,255,0.1) 0%, transparent 100%);
    opacity: 0;
    transition: var(--transition);
}

.item-card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; width: 100%; height: 2px;
    background: var(--neon-primary);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.4s ease;
}

.item-card:hover {
    transform: translateY(-10px) scale(1.02);
    border-color: rgba(0, 240, 255, 0.4);
    box-shadow: 0 15px 35px rgba(0,0,0,0.8), 0 0 30px rgba(0,240,255,0.15);
}

.item-card:hover::before { opacity: 1; }
.item-card:hover::after { transform: scaleX(1); }

mark.highlight {
    background: rgba(0, 240, 255, 0.2);
    color: var(--neon-primary);
    border-radius: 2px;
    padding: 0 2px;
    box-shadow: 0 0 8px rgba(0, 240, 255, 0.4);
}

.card-name {
    font-family: var(--font-display);
    font-size: 1.4rem;
    font-weight: 700;
    letter-spacing: 1px;
    margin-bottom: 15px;
    color: var(--text-main);
    position: relative;
    z-index: 2;
}

.card-separator {
    height: 1px;
    border: none;
    background: linear-gradient(90deg, var(--neon-primary), transparent);
    margin-bottom: 15px;
    width: 60%;
    opacity: 0.5;
}

.card-details {
    margin-top: auto;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    position: relative;
    z-index: 2;
}

.card-info {
    display: flex;
    flex-direction: column;
    gap: 8px;
    font-family: var(--font-mono);
    font-size: 0.9rem;
}

.info-row { display: flex; align-items: center; gap: 8px; }
.info-row i { color: var(--neon-primary); font-size: 0.8rem; opacity: 0.7; }
.info-row span { color: var(--text-muted); }

.card-price {
    font-family: var(--font-display);
    font-size: 1.8rem;
    font-weight: 900;
    color: var(--neon-warning);
    text-shadow: 0 0 15px rgba(255, 207, 0, 0.3);
}

.preview-chamber {
    flex-shrink: 0;
    height: clamp(200px, 25vh, 260px);
    position: relative;
    border-top: 1px solid rgba(0, 240, 255, 0.2);
    background: radial-gradient(ellipse at bottom, rgba(4, 12, 24, 0.8) 0%, #010308 100%);
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

.preview-chamber::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(90deg, transparent, transparent 50px, rgba(0,240,255,0.02) 50px, rgba(0,240,255,0.02) 51px);
}

.preview-chamber::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 1px;
    background: var(--neon-primary);
    box-shadow: 0 0 15px var(--neon-primary);
    opacity: 0;
    transition: opacity 0.3s;
}

.preview-chamber.active::after { opacity: 1; }

.preview-content {
    position: absolute;
    width: 100%;
    max-width: 1600px;
    padding: 0 clamp(20px, 4vw, 60px);
    transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    z-index: 10;
}

.preview-content.hidden {
    opacity: 0;
    transform: translateY(40px) scale(0.95);
    pointer-events: none;
}

.preview-default { text-align: center; }

.preview-default h2 {
    font-family: var(--font-display);
    font-size: clamp(1.5rem, 3vw, 2.5rem);
    color: rgba(255,255,255,0.1);
    letter-spacing: 10px;
    text-transform: uppercase;
    animation: pulseText 3s infinite alternate;
}

@keyframes pulseText {
    0% { color: rgba(255,255,255,0.1); text-shadow: none; }
    100% { color: rgba(0,240,255,0.3); text-shadow: 0 0 20px rgba(0,240,255,0.2); }
}

.preview-active {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.preview-main-info { flex: 1; }

.preview-name {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: clamp(2rem, 5vw, 3.5rem);
    line-height: 1.1;
    letter-spacing: 2px;
    color: #fff;
    text-shadow: 0 0 20px rgba(0, 240, 255, 0.4);
    margin-bottom: 15px;
}

.preview-meta {
    display: flex;
    gap: 40px;
    font-family: var(--font-mono);
    font-size: clamp(1rem, 1.5vw, 1.2rem);
    color: var(--text-muted);
}

.preview-meta-item { display: flex; align-items: center; gap: 10px; }
.preview-meta-item i { color: var(--neon-primary); }
.preview-meta-item span { color: #fff; font-weight: 600; }

.preview-price-box {
    text-align: right;
    padding-left: 40px;
    border-left: 1px solid rgba(0, 240, 255, 0.2);
}

.preview-price-label {
    font-family: var(--font-mono);
    font-size: 1rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 5px;
}

.preview-price {
    font-family: var(--font-display);
    font-size: clamp(2.5rem, 6vw, 4.5rem);
    font-weight: 900;
    color: var(--neon-warning);
    text-shadow: 0 0 30px rgba(255, 207, 0, 0.3);
    line-height: 1;
}

.empty-state {
    width: 100%;
    text-align: center;
    font-family: var(--font-mono);
    color: var(--neon-accent);
    font-size: 1.2rem;
    letter-spacing: 2px;
    text-shadow: 0 0 10px rgba(255,0,60,0.4);
    animation: blink 2s infinite;
}

@keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
}

@media (max-width: 1024px) {
    .header-and-search { grid-template-columns: 1fr; gap: 20px; }
    .header h1 { text-align: center; }
    .header h1::before { left: 50%; transform: translateX(-50%); animation: none; clip-path: none; }
    .preview-active { flex-direction: column; text-align: center; gap: 20px; }
    .preview-meta { justify-content: center; flex-wrap: wrap; gap: 20px; }
    .preview-price-box { text-align: center; padding-left: 0; border-left: none; border-top: 1px solid rgba(0,240,255,0.2); padding-top: 20px; width: 100%; }
}

@media (max-height: 600px) and (orientation: landscape) {
    .hud-controls { padding: 15px; }
    .header-and-search { margin-bottom: 15px; grid-template-columns: auto 1fr; }
    .item-card { height: 160px; padding: 15px; }
    .preview-chamber { height: 160px; }
    .preview-name { font-size: 2rem; margin-bottom: 10px; }
    .preview-price { font-size: 2.5rem; }
}
</style>
</head>
<body>
    <div class="app-container">
        <header class="hud-container">
            <div class="hud-controls">
                <div class="header-and-search">
                    <div class="header"><h1>Lx Search P1.2</h1></div>
                    <div class="search-wrapper">
                        <i class="fas fa-search search-icon"></i>
                        <input type="text" class="search-input" id="searchInput" placeholder="Initialize query matrix..." autocomplete="off" spellcheck="false">
                    </div>
                </div>
                <div class="filter-wrapper">
                    <select class="filter-select" id="unitFilter"><option value="">All Units</option></select>
                    <select class="filter-select" id="companyFilter"><option value="">All Sources</option></select>
                    <button class="reset-button" id="resetFilters"><i class="fas fa-power-off"></i> Purge</button>
                </div>
                <div id="status-bar">
                    <div id="suggestionsArea" class="suggestions-area"></div>
                    <div id="filterTagsContainer" class="filter-tags-container"></div>
                </div>
            </div>
        </header>
        
        <main class="scroll-container">
            <div id="cardContainer"></div>
            <button class="scroll-button scroll-left" id="scrollLeft"><i class="fas fa-angle-left"></i></button>
            <button class="scroll-button scroll-right" id="scrollRight"><i class="fas fa-angle-right"></i></button>
        </main>

        <footer class="preview-chamber" id="previewChamber">
            <div class="preview-content preview-default" id="previewDefault">
                <h2>Awaiting Selection</h2>
            </div>
            <div class="preview-content preview-active hidden" id="previewActive">
                <div class="preview-main-info">
                    <h2 class="preview-name" id="previewName"></h2>
                    <div class="preview-meta">
                        <div class="preview-meta-item">
                            <i class="fas fa-box"></i>
                            <span id="previewUnit"></span>
                        </div>
                        <div class="preview-meta-item">
                            <i class="fas fa-globe-americas"></i>
                            <span id="previewSource"></span>
                        </div>
                    </div>
                </div>
                <div class="preview-price-box">
                    <div class="preview-price-label">Credit Value</div>
                    <div class="preview-price" id="previewPrice"></div>
                </div>
            </div>
        </footer>
    </div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const resizeApp = () => document.documentElement.style.setProperty('--app-height', `${window.innerHeight}px`);
    window.addEventListener('resize', resizeApp);
    resizeApp();

    const medicines = [

    const escapeHTML = str => String(str || '').replace(/[&<>"']/g, m => ({'&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'}[m]));

    const highlightText = (text, query) => {
        const safeText = escapeHTML(text);
        if (!query) return safeText;
        const regex = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
        return safeText.replace(regex, '<mark class="highlight">$1</mark>');
    };

    const buildCard = (med, query, index) => {
        const card = document.createElement('div');
        card.className = 'item-card';
        card.style.animationDelay = `${index * 0.03}s`;
        card.innerHTML = `
            <h3 class="card-name">${highlightText(med.name, query)}</h3>
            <hr class="card-separator">
            <div class="card-details">
                <div class="card-info">
                    <div class="info-row"><i class="fas fa-box"></i><span>${escapeHTML(med.unit)}</span></div>
                    <div class="info-row"><i class="fas fa-globe-americas"></i><span>${highlightText(med.company, query)}</span></div>
                </div>
                <div class="card-price">${med.price.toFixed(2)}</div>
            </div>`;
        card.addEventListener('mouseenter', () => activatePreview(med));
        return card;
    };

    const activatePreview = (med) => {
        ui.pName.textContent = med.name;
        ui.pUnit.textContent = med.unit;
        ui.pSource.textContent = med.company;
        ui.pPrice.textContent = med.price.toFixed(2);
        ui.chamber.classList.add('active');
        ui.pDefault.classList.add('hidden');
        ui.pActive.classList.remove('hidden');
    };

    const resetPreview = () => {
        ui.chamber.classList.remove('active');
        ui.pDefault.classList.remove('hidden');
        ui.pActive.classList.add('hidden');
    };

    const initFilters = () => {
        const populate = (data, el) => [...new Set(data)].sort().forEach(val => el.add(new Option(val, val)));
        populate(medicines.map(m => m.unit), ui.unit);
        populate(medicines.map(m => m.company), ui.company);
    };

    const calcDistance = (a, b) => {
        if (!a || !b) return 100;
        const m = Array(a.length + 1).fill(null).map(() => Array(b.length + 1).fill(null));
        for (let i = 0; i <= a.length; i++) m[i][0] = i;
        for (let j = 0; j <= b.length; j++) m[0][j] = j;
        for (let i = 1; i <= a.length; i++) {
            for (let j = 1; j <= b.length; j++) {
                m[i][j] = Math.min(m[i-1][j]+1, m[i][j-1]+1, m[i-1][j-1] + (a[i-1].toLowerCase() === b[j-1].toLowerCase() ? 0 : 1));
            }
        }
        return m[a.length][b.length];
    };

    const processSearch = () => {
        const q = ui.search.value.toLowerCase().trim();
        const u = ui.unit.value;
        const c = ui.company.value;
        
        const results = medicines.filter(m => 
            (!u || m.unit === u) && 
            (!c || m.company === c) && 
            (!q || m.name.toLowerCase().includes(q) || m.company.toLowerCase().includes(q))
        );

        ui.container.innerHTML = '';
        if (results.length) {
            results.forEach((m, i) => ui.container.appendChild(buildCard(m, q, i)));
        } else {
            ui.container.innerHTML = '<div class="empty-state">[ ERROR: MATRIX EMPTY // REDEFINE PARAMETERS ]</div>';
        }

        ui.tags.innerHTML = '';
        const addTag = (txt, fn) => {
            const t = document.createElement('div');
            t.className = 'filter-tag';
            t.innerHTML = `${escapeHTML(txt)}<i class="fas fa-times"></i>`;
            t.querySelector('i').onclick = fn;
            ui.tags.appendChild(t);
        };
        if (q) addTag(`QRY: ${q}`, () => { ui.search.value = ''; processSearch(); });
        if (u) addTag(`UNT: ${u}`, () => { ui.unit.value = ''; processSearch(); });
        if (c) addTag(`SRC: ${c}`, () => { ui.company.value = ''; processSearch(); });

        ui.suggestions.innerHTML = '';
        if (!results.length && q.length > 2) {
            const sim = medicines.map(m => ({n: m.name, d: calcDistance(q, m.name.split(' ')[0])}))
                                 .filter(x => x.d < 4 && x.n.toLowerCase() !== q)
                                 .sort((a,b) => a.d - b.d)
                                 .map(x => x.n)
                                 .filter((v,i,s) => s.indexOf(v) === i)
                                 .slice(0, 3);
            if (sim.length) {
                ui.suggestions.innerHTML = '<span>Did you mean:</span>';
                sim.forEach(s => {
                    const a = document.createElement('a');
                    a.textContent = s;
                    a.onclick = () => { ui.search.value = s; processSearch(); };
                    ui.suggestions.appendChild(a);
                });
            }
        }
    };

    ui.search.addEventListener('input', processSearch);
    ui.unit.addEventListener('change', processSearch);
    ui.company.addEventListener('change', processSearch);
    ui.reset.addEventListener('click', () => { ui.search.value = ''; ui.unit.value = ''; ui.company.value = ''; processSearch(); });
    ui.container.addEventListener('mouseleave', resetPreview);
    
    ui.scrollL.addEventListener('click', () => ui.container.scrollBy({ left: -400, behavior: 'smooth' }));
    ui.scrollR.addEventListener('click', () => ui.container.scrollBy({ left: 400, behavior: 'smooth' }));

    initFilters();
    processSearch();
});
